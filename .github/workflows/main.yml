name: R CI

on:
  push:

jobs:
  R-CMD-CHECK:

    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Install dependencies
        run: |
          Rscript -e 'install.packages("knitr", dependencies = TRUE)'

      - name: Build POPSR
        run: |
          R CMD build POPSR
